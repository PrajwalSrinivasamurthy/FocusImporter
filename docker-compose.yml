services:
  postgres-db:
    image: postgres:16
    container_name: postgres-db
    env_file:
      - .env.local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: focus-importer
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    depends_on:
      - postgres-db
    volumes:
      - logs:/app/logs
    restart: unless-stopped

volumes:
  logs:
  postgres_data:
